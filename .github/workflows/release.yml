name: Release

on:
  push:
    branches:
      - main
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-22.04
    # GH Token permissions as required by semantic-release
    # https://github.com/semantic-release/github?tab=readme-ov-file#github-authentication
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run build
        run: yarn build

      - name: Run test
        run: yarn test

      - name: Publish and create a GitHub release
        run: npx semantic-release
        env:
          GH_TOKEN: ${{ github.token }}
          NPMJS_NPM_CONFIG_REGISTRY: https://registry.npmjs.org
          NPMJS_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_NPM_CONFIG_REGISTRY: https://npm.pkg.github.com
          GITHUB_NPM_TOKEN: ${{ github.token }}
